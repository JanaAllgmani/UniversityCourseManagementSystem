<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #282727ff;
            padding: 10px 24px;
            border-radius: 8px;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px auto;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.25);
            font-weight: bold;
        }

        form {
            width: 400px;
            margin: 20px auto;
            background-color: #a5a5a5b1;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            text-align: left;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input[type="email"], input[type="password"] {
            width: 95%;
            padding: 6px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #60398fb6;
        }

        button {
            margin-top: 14px;
            width: 100%;
            padding: 8px;
            background-color: rgba(74, 38, 120, 0.58);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            opacity: 0.9;
        }


        .back-btn button {
            width: 400px;
            padding: 10px 16px;
            font-size: 16px;
            background-color: #60398fb6; 
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .back-btn button:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

<h2>Student Login</h2>

<form action="login_student.php" method="POST">
    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">Login</button>
</form>

<div class="back-btn" style="margin-top:10px;">
    <button type="button" onclick="window.location.href='index.html'">Back</button>
</div>

</body>
</html>
