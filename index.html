<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>University System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f1f5;
    padding: 20px;
    margin: 0;
}

header {
    text-align: center;
    margin-bottom: 20px;
}

h2 {
    background-color: white;
    color: #432c5a;
    display: inline-block;
    padding: 14px 28px;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 2px 2px 12px rgba(0,0,0,0.15);
    margin: 0 auto;
    font-size: 22px;
}

.button1 button, .button2 button {
    width: 340px;
    padding: 12px 18px;
    font-size: 17px;
    background-color: #6a5f8d;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin: 12px auto;
    display: block;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.18);
}

.button1 button:hover, .button2 button:hover {
    opacity: 0.85;
}



main {
    margin-top: 30px;
}

</style>

</head>

<body>

<header>
    <h2>University Course Management System</h2>
</header>

<main>
    <div class="button1">
        <button type="button" onclick="window.location.href='login_student.html'">Student Login</button>
    </div>

    <div class="button2">
        <button type="button" onclick="window.location.href='login.php'">Instructor Login</button>
    </div>
</main>

</body>
</html>
